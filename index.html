<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <link rel="icon" href="https://fav.farm/%F0%9F%90%A7"/>
    <title>freeCodeCamp Shopping Cart</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1 class="title">Desserts Page</h1>
    </header>
    <main>
      <button id="show-cart-btn" type="button" class="btn">Show Cart</button>
      <div id="cart-container">
        <button class="btn" id="clear-cart-btn">Clear Cart</button>
        <div id="products-container">
          
        </div>
        <p>Total number of items: <span id="total-items">0</span></p>
        <p>Subtotal: <span id="subtotal">$0</span></p>
        <p>Taxes: <span id="taxes">$0</span></p>
        <p>Total: <span id="total">$0</span></p>
      </div>
      <div id="dessert-card-container">
        
      </div>
    </main>
    <script src="script.js"></script>
     <footer class="my-footer">Coded by <a class="bold-link" href="https://github.com/Alexandredark-glitch" target="_blank">Fortunat Hitantsoa Alexandre</a> and made with ❤️</p>   </footer>
  </body>
</html>
